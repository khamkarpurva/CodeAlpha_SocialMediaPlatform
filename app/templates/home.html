{% extends 'base.html' %}
{% block content %}
    {% for post in posts %}
        <div class="post">
            <h3>{{ post.author.username }}</h3>
            <p>{{ post.content }}</p>
            <p>👍 {{ post.likes.count }} likes</p>
            <a href="{% url 'like_post' post.id %}" class="btn">Like</a>
        </div>
    {% endfor %}
{% endblock %}
